<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แดชบอร์ดสรุปยอดสต็อก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="p-2 md:p-6 text-gray-800 pb-10">
    <div class="max-w-5xl mx-auto space-y-4">
        
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 sticky top-2 z-10">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-lg md:text-xl font-bold text-indigo-700 flex items-center gap-2">📊 แดชบอร์ดสรุปยอด</h1>
                <span id="sync-status" class="text-[10px] md:text-xs font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded">กำลังเชื่อมต่อ...</span>
            </div>
            <select id="date-select" onchange="window.renderUI()" class="w-full bg-indigo-50 border border-indigo-100 text-indigo-900 p-2.5 rounded-xl font-bold text-sm focus:outline-none">
                <option value="12/7/69">ดูยอดกะประจำวันที่: 12/7/69</option>
                <option value="13/7/69">ดูยอดกะประจำวันที่: 13/7/69</option>
                <option value="14/7/69">ดูยอดกะประจำวันที่: 14/7/69</option>
            </select>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="bg-cyan-600 text-white px-4 py-2 font-bold text-sm">🏆 หมวดรางวัลปกติ</div>
            <div id="normal-prizes" class="divide-y divide-gray-100"></div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="bg-emerald-600 text-white px-4 py-2 font-bold text-sm">✨ หมวดรางวัลพิเศษ</div>
            <div id="special-prizes" class="divide-y divide-gray-100"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnc4kMj99ugsc19VgIF5zecbdAEwMUJVs",
            authDomain: "check-storck.firebaseapp.com",
            projectId: "check-storck",
            storageBucket: "check-storck.firebasestorage.app",
            messagingSenderId: "258019752916",
            appId: "1:258019752916:web:8fe3e6140ea781ced93441"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const prizes = [
            { id: 'A', name: 'ทิชชู่', total: 800 }, { id: 'B', name: 'ขนม', total: 960 }, { id: 'C', name: 'ช้างเล็ก', total: 120 }, { id: 'D', name: 'ช้างใหญ่', total: 60 }, { id: 'E', name: 'สกุชชี่เล็ก', total: 60 }, { id: 'F', name: 'พวงกุญแจเล็ก', total: 120 }, { id: 'G', name: 'พวงกุญแจใหญ่', total: 60 }, { id: 'H', name: 'กระจก/หวี/แปรงสีฟัน/ฟองน้ำ', total: 240 },
            { id: '111', name: 'เต่า', total: 12 }, { id: '222', name: 'ตุ๊กตาเป็ด', total: 12 }, { id: '333', name: 'สกุชชี่ซาลาเปา', total: 24 }, { id: '444', name: 'สกุชชี่ขนม', total: 36 }, { id: '555', name: 'สกุชชี่กล่องเทา', total: 3 }, { id: '666', name: 'ร่ม', total: 6 }, { id: 'EDU', name: 'ออมสิน', total: 2 }, { id: 'VRU', name: 'ที่นอน', total: 3 }, { id: '2026', name: 'ตุ๊กตาใหญ่', total: 2 }, { id: 'KRU69', name: 'เสื้อคณะ', total: 3 }
        ];

        window.remoteData = {};
        const dates = ["12-7-69", "13-7-69", "14-7-69"];
        const statusEl = document.getElementById('sync-status');

        // เข้าสู่ระบบแบบไม่ระบุตัวตน และเปิดท่อข้อมูล
        signInAnonymously(auth).then(() => {
            let loadedCount = 0;
            dates.forEach(d => {
                onSnapshot(doc(db, 'daily_stocks', d), (snap) => {
                    window.remoteData[d.replace(/-/g, '/')] = snap.data() || {};
                    loadedCount++;
                    if(loadedCount > 0) {
                        statusEl.innerText = "ออนไลน์ 🟢";
                        statusEl.className = "text-[10px] md:text-xs font-bold text-green-700 bg-green-100 px-2 py-1 rounded";
                    }
                    window.renderUI();
                }, (error) => {
                    statusEl.innerText = "Error: " + error.code;
                    statusEl.className = "text-[10px] md:text-xs font-bold text-red-700 bg-red-100 px-2 py-1 rounded";
                });
            });
        }).catch(err => {
            statusEl.innerText = "Auth Error";
        });

        // วาดหน้าจอ
        window.renderUI = () => {
            const selectedDate = document.getElementById('date-select').value;
            
            const generateHTML = (list) => {
                // ส่วนหัวตาราง (โชว์เฉพาะจอคอม/แท็บเล็ต)
                let html = `
                    <div class="hidden sm:flex text-[10px] md:text-xs font-bold text-gray-500 bg-gray-50 px-3 py-2 border-b text-center">
                        <div class="w-1/3 text-left">รหัส / รายการ</div>
                        <div class="w-1/6">กะ 1</div>
                        <div class="w-1/6">กะ 2</div>
                        <div class="w-1/6">กะ 3</div>
                        <div class="w-1/6 text-indigo-600">รวมออกทั้งหมด</div>
                        <div class="w-1/6 text-red-600">คงเหลือ</div>
                    </div>
                `;

                html += list.map(p => {
                    // ดึงข้อมูลกะของวันที่เลือกมาโชว์
                    const dayData = window.remoteData[selectedDate] || {};
                    const itemData = dayData[p.id] || { shift1: 0, shift2: 0, shift3: 0 };
                    const s1 = Number(itemData.shift1 || 0);
                    const s2 = Number(itemData.shift2 || 0);
                    const s3 = Number(itemData.shift3 || 0);

                    // คำนวณยอดขายรวมสะสมทุกวัน (ตั้งแต่ 12 ถึง 14)
                    let totalCumulativeSold = 0;
                    ["12/7/69", "13/7/69", "14/7/69"].forEach(d => {
                        const dData = window.remoteData[d] || {};
                        const iData = dData[p.id] || {};
                        totalCumulativeSold += (Number(iData.shift1 || 0) + Number(iData.shift2 || 0) + Number(iData.shift3 || 0));
                    });

                    // คำนวณยอดคงเหลือจริง
                    const remain = p.total - totalCumulativeSold;

                    return `
                        <div class="flex flex-col sm:flex-row px-3 py-3 border-b hover:bg-gray-50 text-sm">
                            <div class="w-full sm:w-1/3 flex items-center gap-2 mb-3 sm:mb-0">
                                <span class="bg-indigo-100 text-indigo-700 text-[10px] font-bold px-1.5 py-0.5 rounded">${p.id}</span>
                                <span class="font-bold text-gray-800">${p.name}</span>
                                <span class="text-[10px] text-gray-400 sm:hidden ml-auto">(ตั้งต้น: ${p.total})</span>
                            </div>
                            
                            <div class="w-full sm:w-2/3 flex justify-between sm:justify-around items-center text-xs sm:text-sm">
                                <div class="text-center w-10"><span class="sm:hidden text-gray-400 text-[10px] block mb-1">กะ 1</span><span class="font-semibold text-gray-600">${s1}</span></div>
                                <div class="text-center w-10"><span class="sm:hidden text-gray-400 text-[10px] block mb-1">กะ 2</span><span class="font-semibold text-gray-600">${s2}</span></div>
                                <div class="text-center w-10"><span class="sm:hidden text-gray-400 text-[10px] block mb-1">กะ 3</span><span class="font-semibold text-gray-600">${s3}</span></div>
                                
                                <div class="text-center bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100">
                                    <span class="sm:hidden text-indigo-500 text-[10px] block mb-0.5">รวมออก</span>
                                    <span class="font-bold text-indigo-700 text-base">${totalCumulativeSold}</span>
                                </div>
                                <div class="text-center bg-red-50 px-3 py-1.5 rounded-lg border border-red-100">
                                    <span class="sm:hidden text-red-500 text-[10px] block mb-0.5">เหลือ</span>
                                    <span class="font-bold text-lg ${remain <= 0 ? 'text-red-600' : 'text-red-500'}">${remain}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                return html;
            };

            document.getElementById('normal-prizes').innerHTML = generateHTML(prizes.slice(0, 8));
            document.getElementById('special-prizes').innerHTML = generateHTML(prizes.slice(8));
        };
    </script>
</body>
</html>
