<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบเช็คสต็อกรางวัล (Firebase)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-6 text-gray-800">
    <div class="max-w-3xl mx-auto space-y-4">
        
        <!-- ส่วนควบคุม -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 sticky top-2 z-10">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-xl font-bold text-gray-800">จัดการสต็อก <span id="sync-status" class="text-[10px] text-gray-500 bg-gray-100 px-2 py-1 rounded-full">รอเชื่อมต่อ...</span></h1>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <select id="date-select" onchange="window.renderUI()" class="w-full p-2 border border-blue-200 bg-blue-50 text-blue-800 rounded-xl font-bold"></select>
                <select id="shift-select" onchange="window.renderUI()" class="w-full p-2 border border-orange-200 bg-orange-50 text-orange-800 rounded-xl font-bold"></select>
            </div>
        </div>
        
        <!-- หมวดรางวัลปกติ -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="bg-cyan-500 text-white px-4 py-2 font-bold text-sm flex justify-between">
                <span>🏆 หมวดรางวัลปกติ</span>
                <span>เหลือ</span>
            </div>
            <div id="normal-prizes" class="divide-y divide-gray-100"></div>
        </div>

        <!-- หมวดรางวัลพิเศษ -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="bg-emerald-500 text-white px-4 py-2 font-bold text-sm flex justify-between">
                <span>✨ หมวดรางวัลพิเศษ</span>
                <span>เหลือ</span>
            </div>
            <div id="special-prizes" class="divide-y divide-gray-100"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // กุญแจ Firebase 
        const firebaseConfig = {
            apiKey: "AIzaSyBnc4kMj99ugsc19VgIF5zecbdAEwMUJVs",
            projectId: "check-storck",
            appId: "1:258019752916:web:8fe3e6140ea781ced93441"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // รายการรางวัลและสต็อกตั้งต้น
        const prizes = [
            { id: 'A', name: 'ทิชชู่', total: 800 }, { id: 'B', name: 'ขนม', total: 960 }, { id: 'C', name: 'ช้างเล็ก', total: 120 },
            { id: 'D', name: 'ช้างใหญ่', total: 60 }, { id: 'E', name: 'สกุชชี่เล็ก', total: 60 }, { id: 'F', name: 'พวงกุญแจเล็ก', total: 120 },
            { id: 'G', name: 'พวงกุญแจใหญ่', total: 60 }, { id: 'H', name: 'กระจก/หวี/แปรงสีฟัน/ฟองน้ำ', total: 240 },
            { id: '111', name: 'เต่า', total: 12 }, { id: '222', name: 'ตุ๊กตาเป็ด', total: 12 }, { id: '333', name: 'สกุชชี่ซาลาเปา', total: 24 },
            { id: '444', name: 'สกุชชี่ขนม', total: 36 }, { id: '555', name: 'สกุชชี่กล่องเทา', total: 3 }, { id: '666', name: 'ร่ม', total: 6 },
            { id: 'EDU', name: 'ออมสิน', total: 2 }, { id: 'VRU', name: 'ที่นอน', total: 3 }, { id: '2026', name: 'ตุ๊กตาใหญ่', total: 2 }, { id: 'KRU69', name: 'เสื้อคณะ', total: 3 }
        ];

        window.remoteData = {};

        // เตรียม Dropdown
        document.getElementById('date-select').innerHTML = ["12/7/69", "13/7/69", "14/7/69"].map(d => `<option value="${d}">${d}</option>`).join('');
        document.getElementById('shift-select').innerHTML = ["shift1", "shift2", "shift3"].map(s => `<option value="${s}">กะ ${s.replace('shift','')}</option>`).join('');

        // ล็อกอินอัตโนมัติแล้วเปิดท่อรับข้อมูล
        signInAnonymously(auth).then(() => {
            ["12-7-69", "13-7-69", "14-7-69"].forEach(d => {
                onSnapshot(doc(db, 'daily_stocks', d), (snap) => {
                    window.remoteData[d.replace(/-/g, '/')] = snap.data() || {};
                    document.getElementById('sync-status').innerText = "ออนไลน์ 🟢";
                    window.renderUI();
                });
            });
        });

        // ฟังก์ชันคำนวณและวาดหน้าจอ
        window.renderUI = () => {
            const date = document.getElementById('date-select').value;
            const shift = document.getElementById('shift-select').value;

            const renderItems = (list) => list.map(p => {
                // ข้อมูลของวันและกะที่กำลังเลือกอยู่
                const dailyData = window.remoteData[date] || {};
                const itemData = dailyData[p.id] || {};
                const currentVal = Number(itemData[shift] || 0);
                
                // คำนวณยอดสะสมรวม (บวกตั้งแต่วันที่ 12 จนถึงวันที่เลือก)
                let totalSold = 0;
                const dateOrder = ["12/7/69", "13/7/69", "14/7/69"];
                
                for (let d of dateOrder) {
                    const dData = window.remoteData[d] || {};
                    const iData = dData[p.id] || {};
                    totalSold += (Number(iData.shift1 || 0) + Number(iData.shift2 || 0) + Number(iData.shift3 || 0));
                    
                    // ถ้าบวกถึงวันที่เลือกอยู่แล้ว ให้หยุดบวกทันที (ยอดของวันพรุ่งนี้จะไม่ถูกนำมาหัก)
                    if (d === date) break; 
                }

                // สต็อกตั้งต้น ลบยอดขายสะสม
                const remain = p.total - totalSold;

                return `
                    <div class="flex items-center p-3 hover:bg-gray-50 text-sm border-b border-gray-100 last:border-0">
                        <div class="w-1/3 sm:w-2/5 flex flex-col justify-center">
                            <div class="flex items-center gap-1 sm:gap-2 flex-wrap">
                                <span class="bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded text-[9px] font-bold">${p.id}</span>
                                <span class="font-bold text-gray-800 leading-tight">${p.name}</span>
                            </div>
                            <span class="text-[10px] text-gray-500 mt-0.5">ตั้งต้น: ${p.total}</span>
                        </div>
                        
                        <div class="flex-1 flex justify-center items-center gap-1 sm:gap-2">
                            <button onclick="window.changeValue('${p.id}', -1)" class="w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center bg-gray-100 text-gray-600 font-bold rounded shadow-sm active:bg-gray-200">-</button>
                            <input type="number" id="input_${p.id}" value="${currentVal}" onchange="window.saveData('${p.id}', this.value)" class="w-10 sm:w-14 h-7 sm:h-8 text-center font-bold text-base border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-orange-400 bg-orange-50/50">
                            <button onclick="window.changeValue('${p.id}', 1)" class="w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center bg-gray-100 text-gray-600 font-bold rounded shadow-sm active:bg-gray-200">+</button>
                        </div>
                        
                        <div class="w-10 sm:w-16 text-right font-bold text-lg ${remain <= 0 ? 'text-red-500' : 'text-gray-700'}">
                            ${remain <= 0 ? '0' : remain}
                        </div>
                    </div>`;
            }).join('');

            document.getElementById('normal-prizes').innerHTML = renderItems(prizes.slice(0, 8));
            document.getElementById('special-prizes').innerHTML = renderItems(prizes.slice(8));
        };

        // ฟังก์ชันกดปุ่มบวก-ลบ
        window.changeValue = (id, delta) => {
            const input = document.getElementById(`input_${id}`);
            const newVal = Math.max(0, parseInt(input.value) + delta);
            input.value = newVal;
            window.saveData(id, newVal);
        };

        // ฟังก์ชันบันทึกลงฐานข้อมูล
        window.saveData = async (id, val) => {
            document.getElementById('sync-status').innerText = "กำลังเซฟ...";
            const dateStr = document.getElementById('date-select').value.replace(/\//g, '-');
            const shift = document.getElementById('shift-select').value;
            await setDoc(doc(db, 'daily_stocks', dateStr), { [id]: { [shift]: Number(val) } }, { merge: true });
        };
    </script>
</body>
</html>
